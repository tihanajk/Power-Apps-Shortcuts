<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plugins view</title>
    <link rel="stylesheet" href="../common.css" />
    <link rel="stylesheet" href="plugins.css" />
  </head>
  <body>
    <div id="header">
      <h1 id="assembly-name">Plugins view</h1>
      <input id="search" placeholder="Search" name="filter" type="text" />

      <label class="toggle"

        ><span class="toggle-label">Expand all</span></label
      >
    </div>
    <div id="tree"></div>

    <script src="plugins.js"></script>
  </body>
</html>
