<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Audit History</title>
    <link rel="stylesheet" href="auditHistory.css" />
  </head>

  <body>
    <div id="header">
      <div style="display: flex; justify-content: space-between">
        <h1 id="record-name"></h1>
        <button type="button" id="downloadBtn">Export to excel</button>
      </div>
      <input id="search" placeholder="Search" name="filter" type="text" />
    </div>
    <div id="filters">
      <label><input type="checkbox" name="eventFilter" value="Create" checked style="accent-color: #6a7e9d" /> Create</label>
      <label><input type="checkbox" name="eventFilter" value="Update" checked style="accent-color: #6a7e9d" /> Update</label>
      <label><input type="checkbox" name="eventFilter" value="Delete" checked style="accent-color: #6a7e9d" /> Delete</label>
    </div>
    <div id="audit-content">Results</div>
    <script src="../../xlsx.full.min.js"></script>
    <script src="../../excelHelper.js"></script>
    <script src="auditHistory.js"></script>
  </body>
</html>
