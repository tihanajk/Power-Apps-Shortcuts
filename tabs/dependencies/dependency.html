<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Process dependencies</title>
    <link rel="stylesheet" href="../common.css" />
    <link rel="stylesheet" href="dependency.css" />
  </head>

  <body>
    <div id="header">
      <div style="display: flex; justify-content: space-between">
        <h1 id="field-name"></h1>
        <button type="button" id="downloadBtn">Export to excel</button>
      </div>
      <input id="search" placeholder="Search" name="filter" type="text" />
    </div>
    <div id="filters">
      <div>
        <label class="toggle"
          ><input type="checkbox" id="activeOnlyCheckbox" name="activeOnly" /><span class="toggle-switch"></span
          ><span class="toggle-label">Only active</span></label
        >
      </div>
      <div>
        <label class="toggle"
          ><input type="checkbox" id="brCheckbox" name="br" checked /><span class="toggle-switch"></span
          ><span class="toggle-label">Business rules</span></label
        >
        <label class="toggle"
          ><input type="checkbox" id="flowCheckbox" name="flow" checked /><span class="toggle-switch"></span
          ><span class="toggle-label">Flows</span></label
        >
        <label class="toggle"
          ><input type="checkbox" id="bpfCheckbox" name="bpf" checked /><span class="toggle-switch"></span
          ><span class="toggle-label">BPF</span></label
        >
        <label class="toggle"
          ><input type="checkbox" id="wfCheckbox" name="wf" checked /><span class="toggle-switch"></span><span class="toggle-label">WF</span></label
        >
        <label class="toggle"
          ><input type="checkbox" id="actionCheckbox" name="action" checked /><span class="toggle-switch"></span
          ><span class="toggle-label">Actions</span></label
        >
        <label class="toggle"
          ><input type="checkbox" id="plCheckbox" name="pl" checked /><span class="toggle-switch"></span
          ><span class="toggle-label">Plugins</span></label
        >
      </div>
    </div>

    <div id="dependency-content">
      <div id="loading" class="loading">
        <span class="spinner"></span>
        <span>Loading dependencies...</span>
      </div>
    </div>

    <script src="../../xlsx.full.min.js"></script>
    <script src="dependency.js"></script>
  </body>
</html>
