<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Option set values</title>
    <link rel="stylesheet" href="../common.css" />
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div id="header" style="padding-left: 10px">
      <div style="display: flex; justify-content: space-between">
        <h1>OPTIONSET VALUES</h1>
        <button type="button" id="downloadBtn">Export to excel</button>
      </div>
      <div id="filters">
        <label class="toggle"
          ><input type="checkbox" id="formOnlyCheckbox" name="formOnly" /><span class="toggle-switch"></span
          ><span class="toggle-label">Show only those on form</span></label
        >

        <label class="toggle"
          ><input type="checkbox" id="multiOnlyCheckbox" name="multiOnly" /><span class="toggle-switch"></span
          ><span class="toggle-label">Show only multiselect</span></label
        >

        <label class="toggle"
          ><input type="checkbox" id="boolOnlyCheckbox" name="boolOnly" /><span class="toggle-switch"></span
          ><span class="toggle-label">Show only boolean</span></label
        >
      </div>
      <p>* fields that are on the form have 🟢 next to them</p>
      <p>* fields that are multiselect optionsets have Ⓜ️ next to them</p>
      <p>* fields that are boolean have 🅱️ next to them</p>
    </div>
    <div id="options">
      <div id="options-count" class="count"></div>
      <div class="table-container">
        <table id="big-table">
          <thead>
            <tr>
              <th>Field</th>
              <th>Options</th>
            </tr>
          </thead>
          <tbody id="dynamic-content"></tbody>
        </table>
      </div>
    </div>
    <script src="../../xlsx.full.min.js"></script>
    <script src="../../excelHelper.js"></script>
    <script src="options.js"></script>
  </body>
</html>
