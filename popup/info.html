<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Power Apps shortcuts</title>
    <script src="info.js" defer=""></script>
    <!-- Link to the external script -->
    <link rel="stylesheet" href="info.css" />
  </head>
  <body>
    <header class="popup-header">
      <div class="title-row">
        <img class="logo" src="../img/icon.png" alt="" />
        <h2>Power Apps Shortcuts</h2>
      </div>
      <span class="version">v2.0.0.24</span>
    </header>

    <p class="hint">Assign keyboard shortcuts in <code>edge://extensions/shortcuts</code>, or trigger an action directly below.</p>
    <button id="open-shortcuts" class="primary-btn">Manage keyboard shortcuts</button>

    <div class="search-wrap">
      <input id="action-search" type="text" placeholder="Search actions…" />
    </div>

    <div class="actions-divider">Actions</div>
    <div id="action-buttons"></div>
  </body>
</html>
